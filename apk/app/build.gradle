plugins {
    id 'com.android.application'
}

android {
    namespace 'com.rokid.desktop'
    compileSdk 35

    defaultConfig {
        applicationId 'com.rokid.desktop'
        minSdk 32
        targetSdk 35
        versionCode 2
        versionName '2.0'
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
}
